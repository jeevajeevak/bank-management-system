name: Build & Release JavaBank

# Triggers: push a version tag like  git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:

  # ── Job 1: Build fat JAR (runs on Linux – fast) ───────────────
  build-jar:
    name: Build Fat JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR with Maven
        run: mvn package -q
        # This produces  target/JavaBank.jar  (includes MySQL driver inside)

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavaBank-jar
          path: target/JavaBank.jar

  # ── Job 2: Create Windows EXE using jpackage ──────────────────
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: build-jar   # Wait for JAR to be built first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (jpackage needs 17+)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: JavaBank-jar
          path: target/

      - name: Create Windows EXE with jpackage
        run: |
          mkdir -p dist
          jpackage `
            --input target `
            --name "JavaBank" `
            --main-jar JavaBank.jar `
            --main-class bank.Main `
            --type exe `
            --dest dist `
            --app-version "1.0.0" `
            --vendor "JavaBank" `
            --description "Bank Management System" `
            --win-shortcut `
            --win-menu `
            --win-menu-group "JavaBank" `
            --win-dir-chooser `
            --java-options "-Xmx512m"
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavaBank-windows-exe
          path: dist/*.exe

  # ── Job 3: Create GitHub Release with all assets ───────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-windows-exe]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: JavaBank-jar
          path: release-assets/

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: JavaBank-windows-exe
          path: release-assets/

      - name: Copy SQL schema
        run: cp sql/schema.sql release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JavaBank ${{ github.ref_name }}"
          body: |
            ## 🏦 JavaBank Management System ${{ github.ref_name }}

            ### Downloads
            | File | Platform | Description |
            |------|----------|-------------|
            | `JavaBank-x.x.x.exe` | Windows | **Installer** – double-click to install |
            | `JavaBank.jar` | All platforms | Run with `java -jar JavaBank.jar` |
            | `schema.sql` | MySQL | Run this in MySQL before first launch |

            ### First-Time Setup
            1. Run `schema.sql` in MySQL Workbench
            2. On first launch, enter your MySQL credentials in the dialog

            ### Requirements
            - Java 11+ (for JAR) / No Java needed for EXE (bundled)
            - MySQL 5.7+
          files: |
            release-assets/*.exe
            release-assets/JavaBank.jar
            release-assets/schema.sql
          draft: false
          prerelease: false
